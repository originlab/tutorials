<h2><a name="Introduction"></a><span class="mw-headline">はじめに</span></h2>
<p>工程能力分析は、プロセスが仕様を満たす製品を製造できるかを評価するために、さまざまな品質ツールを用いて実施されます。次のことが可能です。 
</p>
<ul><li> プロセスが仕様を満たしているかを判断する</li>
<li> 将来のプロセスパフォーマンスを予測する</li>
<li> プロセス改善のための洞察を得て、改善を維持するための指針を提供する</li></ul>

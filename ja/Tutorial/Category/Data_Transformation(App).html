<h2><a name="Introduction"></a><span class="mw-headline">はじめに</span></h2>
<p>多くの解析では、データが正規分布していることが前提となります。データが正規分布していない場合は、変換関数を使用して、データを概ね正規分布に近づけることで、後続の解析を行えるようにします。Originでは、以下の3種類の変換関数を利用できます。 
</p>
<dl><dd><ul><li> Box-Cox変換</li>
<li> Johnson変換</li>
<li> Yeo-Johnson変換</li></ul></dd></dl>
<h2><a name="Processing"></a><span class="mw-headline">処理</span></h2>
<p>データに基づいて変換関数を選択します。
